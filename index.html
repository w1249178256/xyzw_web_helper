<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XYZW 游戏管理系统</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content:;">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "SF Pro Display",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "PingFang SC",
          "Hiragino Sans GB",
          "Microsoft YaHei",
          "Helvetica Neue",
          Helvetica,
          Arial,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }

      #app {
        min-height: 100vh;
      }

      .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loading">正在加载应用...</div>
    </div>
    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/xyzw/cocos2d-js-min.js"></script>
    <script type="module" src="./src/xyzw/game-defines.js"></script>
    <script type="module" src="./src/xyzw/index.js"></script>
<script>
document.addEventListener('deviceready', function() {
  console.log('Cordova 初始化成功');
  // 自动隐藏加载提示
  document.querySelector('.loading').style.display = 'none';
}, false);

window.addEventListener('error', function(e) {
  alert('加载错误: ' + e.message + '\n文件: ' + e.filename + '\n行号: ' + e.lineno);
});
</script>
  </body>
</html>
